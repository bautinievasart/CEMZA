<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CEMZA | DMS Enterprise Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a; --accent: #2563eb; --sidebar-bg: #0f172a;
            --main-bg: #f8fafc; --text-dark: #0f172a; --text-light: #64748b; --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--main-bg); display: flex; color: var(--text-dark); min-height: 100vh; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--sidebar-bg); height: 100vh; position: fixed; display: flex; flex-direction: column; padding: 30px 20px; color: white; z-index: 100; }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; margin-bottom: 50px; }
        .logo span { color: var(--accent); }
        .nav-item { padding: 14px 18px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; color: #94a3b8; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--accent); color: white; }
        .nav-item svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }

        /* MAIN */
        .main { margin-left: 260px; flex: 1; padding: 40px; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; border-radius: 20px; padding: 30px; border: 1px solid #e2e8f0; box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 20px; }
        h1 { font-size: 26px; font-weight: 800; margin-bottom: 25px; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .full { grid-column: span 4; }
        .half { grid-column: span 2; }
        
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; }

        input, select, textarea { padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; background: #f8fafc; transition: 0.2s; }
        input:focus { outline: none; border-color: var(--accent); background: white; }

        .btn { background: var(--primary); color: white; padding: 14px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }

        .section-divider { grid-column: 1/-1; padding: 15px 0 5px 0; border-bottom: 2px solid #f1f5f9; margin-bottom: 10px; font-size: 12px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { background: white; padding: 15px; border-top: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        tr td:first-child { border-left: 1px solid #e2e8f0; border-radius: 10px 0 0 10px; }
        tr td:last-child { border-right: 1px solid #e2e8f0; border-radius: 0 10px 10px 0; text-align: right; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">CEMZA<span>.</span>DMS</div>
        <div class="nav-item active" onclick="switchView('view-autos', this)">Inventario</div>
        <div class="nav-item" onclick="switchView('view-clientes', this)">Clientes</div>
        <div class="nav-item" onclick="switchView('view-contratos', this)">Boleto C/V</div>
        <div class="nav-item" onclick="switchView('view-nota-pedido', this)">Nota de Pedido</div>
    </nav>

    <main class="main">
        <section id="view-autos" class="view active">
            <h1>Inventario</h1>
            <div class="card">
                <input type="hidden" id="v-index" value="-1">
                <div class="grid">
                    <div class="input-group half"><label>Marca</label><input type="text" id="v-marca"></div>
                    <div class="input-group half"><label>Modelo</label><input type="text" id="v-modelo"></div>
                    <div class="input-group"><label>Dominio</label><input type="text" id="v-dominio"></div>
                    <div class="input-group"><label>Año</label><input type="number" id="v-anio"></div>
                    <div class="input-group half"><label>Precio de Venta ($)</label><input type="number" id="v-precio"></div>
                    <button onclick="saveAuto()" class="btn half" style="align-self: flex-end;">Guardar Unidad</button>
                </div>
            </div>
            <table id="tabla-autos"><tbody></tbody></table>
        </section>

        <section id="view-clientes" class="view">
            <h1>Clientes</h1>
            <div class="card">
                <input type="hidden" id="c-index" value="-1">
                <div class="grid">
                    <div class="input-group half"><label>Nombre y Apellido</label><input type="text" id="c-nombre"></div>
                    <div class="input-group half"><label>DNI / CUIT</label><input type="text" id="c-dni"></div>
                    <div class="input-group full"><label>Domicilio</label><input type="text" id="c-domicilio"></div>
                    <button onclick="saveCliente()" class="btn full">Guardar Cliente</button>
                </div>
            </div>
            <table id="tabla-clientes"><tbody></tbody></table>
        </section>

        <section id="view-nota-pedido" class="view">
            <h1>Nota de Pedido Profesional</h1>
            <div class="card">
                <div class="grid">
                    <div class="input-group half"><label>Unidad Solicitada</label><select id="sel-auto-np"></select></div>
                    <div class="input-group half"><label>Cliente</label><select id="sel-cliente-np"></select></div>
                    
                    <div class="section-divider">Unidad que Posee (Permuta)</div>
                    <div class="input-group half"><label>Marca/Modelo</label><input type="text" id="np-p-marca"></div>
                    <div class="input-group"><label>Dominio</label><input type="text" id="np-p-dominio"></div>
                    <div class="input-group"><label>Año</label><input type="number" id="np-p-anio"></div>
                    <div class="input-group half"><label>Valor Toma ($)</label><input type="number" id="np-p-valor" value="0"></div>

                    <div class="section-divider">Liquidación de Gastos</div>
                    <div class="input-group"><label>Inscripción ($)</label><input type="number" id="np-g-insc" value="0"></div>
                    <div class="input-group"><label>Transferencia ($)</label><input type="number" id="np-g-trans" value="0"></div>
                    <div class="input-group"><label>Otorgamiento ($)</label><input type="number" id="np-g-otor" value="0"></div>
                    <div class="input-group"><label>Flete y Formularios ($)</label><input type="number" id="np-g-flete" value="0"></div>
                    
                    <div class="section-divider">Estructura Financiera</div>
                    <div class="input-group"><label>Reserva / Garantía ($)</label><input type="number" id="np-f-reserva" value="0"></div>
                    <div class="input-group"><label>Contado c/ Factura ($)</label><input type="number" id="np-f-contado" value="0"></div>
                    <div class="input-group"><label>Suma a Financiar ($)</label><input type="number" id="np-f-monto" value="0"></div>
                    <div class="input-group"><label>Cant. Cuotas</label><input type="number" id="np-f-cuotas" value="0"></div>
                    <div class="input-group"><label>Importe Cuota ($)</label><input type="number" id="np-f-valor-c" value="0"></div>
                    <div class="input-group"><label>Vendedor</label><input type="text" id="np-f-vendedor"></div>

                    <button onclick="generateLegalPDF('np')" class="btn full" style="background:var(--accent); margin-top:10px;">GENERAR NOTA DE PEDIDO FINAL</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // LÓGICA DE DATOS
        let autos = JSON.parse(localStorage.getItem('cem_a')) || [];
        let clientes = JSON.parse(localStorage.getItem('cem_c')) || [];

        function switchView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            updateSelects();
        }

        function saveAuto() {
            const d = { marca: document.getElementById('v-marca').value, modelo: document.getElementById('v-modelo').value, dominio: document.getElementById('v-dominio').value, anio: document.getElementById('v-anio').value, precio: document.getElementById('v-precio').value };
            autos.push(d); localStorage.setItem('cem_a', JSON.stringify(autos)); render();
        }

        function saveCliente() {
            const d = { nombre: document.getElementById('c-nombre').value, dni: document.getElementById('c-dni').value, domicilio: document.getElementById('c-domicilio').value };
            clientes.push(d); localStorage.setItem('cem_c', JSON.stringify(clientes)); render();
        }

        function render() {
            updateSelects();
            document.querySelector('#tabla-autos tbody').innerHTML = autos.map(a => `<tr><td>${a.marca} ${a.modelo}</td><td>${a.dominio}</td><td>$${Number(a.precio).toLocaleString()}</td><td></td></tr>`).join('');
            document.querySelector('#tabla-clientes tbody').innerHTML = clientes.map(c => `<tr><td>${c.nombre}</td><td>${c.dni}</td><td></td><td></td></tr>`).join('');
        }

        function updateSelects() {
            const optA = autos.map((a,i) => `<option value="${i}">${a.marca} ${a.modelo}</option>`).join('');
            const optC = clientes.map((c,i) => `<option value="${i}">${c.nombre}</option>`).join('');
            document.getElementById('sel-auto-np').innerHTML = optA;
            document.getElementById('sel-cliente-np').innerHTML = optC;
        }

        // GENERACIÓN DEL PDF CON DATOS COMPLETOS
        function generateLegalPDF(type) {
            const a = autos[document.getElementById('sel-auto-np').value];
            const c = clientes[document.getElementById('sel-cliente-np').value];

            // Captura de todos los campos extra de la pestaña
            const permuta = {
                desc: document.getElementById('np-p-marca').value,
                dom: document.getElementById('np-p-dominio').value,
                anio: document.getElementById('np-p-anio').value,
                valor: Number(document.getElementById('np-p-valor').value)
            };

            const gastos = {
                insc: Number(document.getElementById('np-g-insc').value),
                trans: Number(document.getElementById('np-g-trans').value),
                otor: Number(document.getElementById('np-g-otor').value),
                flete: Number(document.getElementById('np-g-flete').value)
            };
            const totalG = Object.values(gastos).reduce((s,v)=>s+v,0);

            const fin = {
                reserva: Number(document.getElementById('np-f-reserva').value),
                contado: Number(document.getElementById('np-f-contado').value),
                monto: Number(document.getElementById('np-f-monto').value),
                cuotas: document.getElementById('np-f-cuotas').value,
                valorC: document.getElementById('np-f-valor-c').value,
                vendedor: document.getElementById('np-f-vendedor').value
            };

            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <style>
                        body { font-family: 'Plus Jakarta Sans', sans-serif; padding: 40px; color: #1e293b; font-size: 11px; line-height: 1.4; }
                        .header { display: flex; justify-content: space-between; border-bottom: 3px solid #0f172a; padding-bottom: 10px; margin-bottom: 20px; }
                        .title { text-align: center; font-weight: 800; text-transform: uppercase; background: #0f172a; color: white; padding: 8px; margin: 15px 0; border-radius: 4px; }
                        .section { font-weight: 800; color: #2563eb; text-transform: uppercase; margin-top: 15px; border-bottom: 1px solid #e2e8f0; padding-bottom: 3px; font-size: 9px; }
                        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
                        .box { background: #f8fafc; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; }
                        .box label { display: block; font-size: 8px; color: #64748b; font-weight: 700; text-transform: uppercase; }
                        .box p { margin: 0; font-weight: 600; font-size: 11px; }
                        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
                        table td { padding: 6px; border-bottom: 1px solid #e2e8f0; }
                        .clausulas { font-size: 8.5px; text-align: justify; color: #475569; margin-top: 15px; }
                        .firmas { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; margin-top: 50px; text-align: center; }
                        .linea { border-top: 1px solid #cbd5e1; padding-top: 5px; font-weight: 800; font-size: 9px; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <div style="font-size:22px; font-weight:800">CEMZA <span style="color:#2563eb">AUTOMOTORES</span></div>
                        <div style="text-align:right">Fecha: ${new Date().toLocaleDateString()}</div>
                    </div>
                    <div class="title">Nota de Pedido de Unidad - Propuesta Comercial</div>
                    
                    <div class="section">Datos del Proponente</div>
                    <div class="grid">
                        <div class="box"><label>Nombre</label><p>${c.nombre.toUpperCase()}</p></div>
                        <div class="box"><label>DNI/CUIT</label><p>${c.dni}</p></div>
                        <div class="box" style="grid-column: span 2;"><label>Domicilio Legal</label><p>${c.domicilio}</p></div>
                    </div>

                    <div class="section">Detalle de Operación</div>
                    <div class="grid">
                        <div class="box"><label>Unidad Solicitada</label><p>${a.marca} ${a.modelo} (${a.anio})</p></div>
                        <div class="box"><label>Precio Venta</label><p>$${Number(a.precio).toLocaleString()}</p></div>
                    </div>

                    ${permuta.valor > 0 ? `
                    <div class="section">Unidad que Posee (Permuta)</div>
                    <div class="grid">
                        <div class="box"><label>Marca/Modelo</label><p>${permuta.desc}</p></div>
                        <div class="box"><label>Dominio / Año</label><p>${permuta.dom} - ${permuta.anio}</p></div>
                        <div class="box"><label>Valor de Toma</label><p>$${permuta.valor.toLocaleString()}</p></div>
                    </div>` : ''}

                    <div class="section">Liquidación de Gastos</div>
                    <table>
                        <tr><td>Gastos de Inscripción y Transferencia</td><td align="right">$${(gastos.insc + gastos.trans).toLocaleString()}</td></tr>
                        <tr><td>Otorgamiento, Flete y Formularios</td><td align="right">$${(gastos.otor + gastos.flete).toLocaleString()}</td></tr>
                        <tr style="font-weight:800; background:#f1f5f9"><td>TOTAL GASTOS A PAGAR</td><td align="right">$${totalG.toLocaleString()}</td></tr>
                    </table>

                    <div class="section">Forma de Pago y Financiación</div>
                    <div class="grid">
                        <div class="box"><label>Reserva / Seña</label><p>$${fin.reserva.toLocaleString()}</p></div>
                        <div class="box"><label>Pago Contado</label><p>$${fin.contado.toLocaleString()}</p></div>
                        <div class="box" style="background:#eef2ff"><label>Saldo a Financiar</label><p>$${fin.monto.toLocaleString()}</p></div>
                        <div class="box" style="background:#eef2ff"><label>Plan de Pago</label><p>${fin.cuotas} cuotas de $${Number(fin.valorC).toLocaleString()}</p></div>
                    </div>

                    <div class="clausulas">
                        <b>CONDICIONES:</b> 1. La presente constituye una oferta de compra sujeta a aprobación. 2. Los gastos de transferencia son a cargo del proponente. 3. La reserva garantiza la prioridad de la unidad por 48hs. 4. El proponente declara conocer y aceptar el estado de la unidad usada exhibida.
                    </div>

                    <div style="margin-top:20px">Vendedor Interviniente: <b>${fin.vendedor || 'Staff CEMZA'}</b></div>

                    <div class="firmas">
                        <div class="linea">FIRMA DEL PROPONENTE</div>
                        <div class="linea">AUTORIZACIÓN CEMZA</div>
                    </div>
                    <script>window.print();<\/script>
                </body>
                </html>
            `);
            win.document.close();
        }

        render();
    </script>
</body>
</html>
