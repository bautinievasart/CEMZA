<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CEMZA | DMS Enterprise Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a; --accent: #2563eb; --sidebar-bg: #0f172a;
            --main-bg: #f8fafc; --text-dark: #0f172a; --text-light: #64748b; --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--main-bg); display: flex; color: var(--text-dark); min-height: 100vh; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--sidebar-bg); height: 100vh; position: fixed; display: flex; flex-direction: column; padding: 30px 20px; color: white; z-index: 100; }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; margin-bottom: 50px; }
        .logo span { color: var(--accent); }
        .nav-item { padding: 14px 18px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; color: #94a3b8; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--accent); color: white; }

        /* MAIN */
        .main { margin-left: 260px; flex: 1; padding: 40px; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; border-radius: 20px; padding: 30px; border: 1px solid #e2e8f0; box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 20px; }
        h1 { font-size: 26px; font-weight: 800; margin-bottom: 25px; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .full { grid-column: span 4; }
        .half { grid-column: span 2; }
        
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; }

        input, select, textarea { padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; background: #f8fafc; transition: 0.2s; }
        input:focus { outline: none; border-color: var(--accent); background: white; }

        .btn { background: var(--primary); color: white; padding: 14px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }

        .section-divider { grid-column: 1/-1; padding: 15px 0 5px 0; border-bottom: 2px solid #f1f5f9; margin-bottom: 10px; font-size: 12px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { background: white; padding: 15px; border-top: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        tr td:first-child { border-left: 1px solid #e2e8f0; border-radius: 10px 0 0 10px; }
        tr td:last-child { border-right: 1px solid #e2e8f0; border-radius: 0 10px 10px 0; text-align: right; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">CEMZA<span>.</span>DMS</div>
        <div class="nav-item active" onclick="switchView('view-autos', this)">Inventario</div>
        <div class="nav-item" onclick="switchView('view-clientes', this)">Clientes</div>
        <div class="nav-item" onclick="switchView('view-contratos', this)">Boleto C/V</div>
        <div class="nav-item" onclick="switchView('view-nota-pedido', this)">Nota de Pedido</div>
    </nav>

    <main class="main">
        <section id="view-autos" class="view active">
            <h1>Inventario</h1>
            <div class="card">
                <div class="grid">
                    <div class="input-group half"><label>Marca</label><input type="text" id="v-marca"></div>
                    <div class="input-group half"><label>Modelo</label><input type="text" id="v-modelo"></div>
                    <div class="input-group"><label>Dominio</label><input type="text" id="v-dominio"></div>
                    <div class="input-group"><label>Año</label><input type="number" id="v-anio"></div>
                    <div class="input-group half"><label>Precio Venta ($)</label><input type="number" id="v-precio"></div>
                    <button onclick="saveAuto()" class="btn half" style="align-self: flex-end;">Guardar Unidad</button>
                </div>
            </div>
            <table id="tabla-autos"><tbody></tbody></table>
        </section>

        <section id="view-clientes" class="view">
            <h1>Clientes</h1>
            <div class="card">
                <div class="grid">
                    <div class="input-group half"><label>Nombre y Apellido</label><input type="text" id="c-nombre"></div>
                    <div class="input-group half"><label>DNI / CUIT</label><input type="text" id="c-dni"></div>
                    <div class="input-group full"><label>Domicilio</label><input type="text" id="c-domicilio"></div>
                    <button onclick="saveCliente()" class="btn full">Guardar Cliente</button>
                </div>
            </div>
            <table id="tabla-clientes"><tbody></tbody></table>
        </section>

        <section id="view-contratos" class="view">
            <h1>Boleto Compra-Venta</h1>
            <div class="card">
                <div class="grid">
                    <div class="input-group half"><label>Seleccionar Unidad</label><select id="sel-auto-cv"></select></div>
                    <div class="input-group half"><label>Seleccionar Comprador</label><select id="sel-cliente-cv"></select></div>
                    <div class="input-group full">
                        <label>Detalle de la Operación (Pago, Permutas, Cheques)</label>
                        <textarea id="obs-pago-cv" rows="5" placeholder="Ej: Se recibe $2.000.000 en efectivo y el resto en 3 cheques de..."></textarea>
                    </div>
                    <button onclick="generateLegalPDF('cv')" class="btn full" style="background:var(--accent)">GENERAR BOLETO LEGAL C/V</button>
                </div>
            </div>
        </section>

        <section id="view-nota-pedido" class="view">
            <h1>Nota de Pedido</h1>
            <div class="card">
                <div class="grid">
                    <div class="input-group half"><label>Unidad Solicitada</label><select id="sel-auto-np"></select></div>
                    <div class="input-group half"><label>Cliente</label><select id="sel-cliente-np"></select></div>
                    
                    <div class="section-divider">Unidad que Posee (Permuta)</div>
                    <div class="input-group half"><label>Marca/Modelo</label><input type="text" id="np-p-marca"></div>
                    <div class="input-group"><label>Dominio</label><input type="text" id="np-p-dominio"></div>
                    <div class="input-group"><label>Año</label><input type="number" id="np-p-anio"></div>
                    <div class="input-group half"><label>Valor Toma ($)</label><input type="number" id="np-p-valor" value="0"></div>

                    <div class="section-divider">Gastos y Financiación</div>
                    <div class="input-group"><label>Gastos Totales ($)</label><input type="number" id="np-g-total" value="0"></div>
                    <div class="input-group"><label>Reserva ($)</label><input type="number" id="np-f-reserva" value="0"></div>
                    <div class="input-group"><label>Monto a Financiar ($)</label><input type="number" id="np-f-monto" value="0"></div>
                    <div class="input-group"><label>Cuotas / Valor</label><input type="text" id="np-f-cuotas" placeholder="12 de $50.000"></div>

                    <button onclick="generateLegalPDF('np')" class="btn full" style="background:var(--accent); margin-top:10px;">GENERAR NOTA DE PEDIDO</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        let autos = JSON.parse(localStorage.getItem('cem_a')) || [];
        let clientes = JSON.parse(localStorage.getItem('cem_c')) || [];

        function switchView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            updateSelects();
        }

        function saveAuto() {
            const d = { marca: document.getElementById('v-marca').value, modelo: document.getElementById('v-modelo').value, dominio: document.getElementById('v-dominio').value, anio: document.getElementById('v-anio').value, precio: document.getElementById('v-precio').value };
            autos.push(d); localStorage.setItem('cem_a', JSON.stringify(autos)); render();
        }

        function saveCliente() {
            const d = { nombre: document.getElementById('c-nombre').value, dni: document.getElementById('c-dni').value, domicilio: document.getElementById('c-domicilio').value };
            clientes.push(d); localStorage.setItem('cem_c', JSON.stringify(clientes)); render();
        }

        function render() {
            updateSelects();
            document.querySelector('#tabla-autos tbody').innerHTML = autos.map(a => `<tr><td><b>${a.marca} ${a.modelo}</b></td><td>${a.dominio}</td><td>$${Number(a.precio).toLocaleString()}</td><td></td></tr>`).join('');
            document.querySelector('#tabla-clientes tbody').innerHTML = clientes.map(c => `<tr><td><b>${c.nombre}</b></td><td>${c.dni}</td><td></td><td></td></tr>`).join('');
        }

        function updateSelects() {
            const optA = autos.map((a,i) => `<option value="${i}">${a.marca} ${a.modelo} (${a.dominio})</option>`).join('');
            const optC = clientes.map((c,i) => `<option value="${i}">${c.nombre}</option>`).join('');
            ['cv', 'np'].forEach(type => {
                document.getElementById(`sel-auto-${type}`).innerHTML = optA;
                document.getElementById(`sel-cliente-${type}`).innerHTML = optC;
            });
        }

        function generateLegalPDF(type) {
            const a = autos[document.getElementById(`sel-auto-${type}`).value];
            const c = clientes[document.getElementById(`sel-cliente-${type}`).value];
            if(!a || !c) return alert("Seleccione vehículo y cliente");

            const win = window.open('', '_blank');
            let bodyContent = "";

            if (type === 'cv') {
                // BOLETO COMPRA VENTA COMPLETO
                const detallePago = document.getElementById('obs-pago-cv').value;
                bodyContent = `
                    <div class="title">Boleto de Compra-Venta Automotor</div>
                    <p>Entre <b>CEMZA AUTOMOTORES</b> en adelante "EL VENDEDOR", y <b>${c.nombre.toUpperCase()}</b>, DNI <b>${c.dni}</b>, con domicilio en <b>${c.domicilio}</b>, en adelante "EL COMPRADOR", se conviene lo siguiente:</p>
                    
                    <div class="section">Primera: Objeto</div>
                    <p>El Vendedor vende al Comprador una unidad usada Marca <b>${a.marca}</b>, Modelo <b>${a.modelo}</b>, Año <b>${a.anio}</b>, Dominio <b>${a.dominio}</b>.</p>

                    <div class="section">Segunda: Precio y Forma de Pago</div>
                    <p>La presente operación se realiza por un precio total de <b>$${Number(a.precio).toLocaleString()}</b>. El pago se efectúa de la siguiente manera: ${detallePago || 'Según acuerdo de partes'}.</p>

                    <div class="section">Tercera: Estado de la Unidad</div>
                    <p>El comprador declara conocer el estado mecánico, de carrocería y conservación de la unidad, la cual se entrega libre de deudas de patentes e infracciones hasta el día de la fecha.</p>

                    <div class="section">Cuarta: Transferencia</div>
                    <p>El comprador se obliga a realizar la transferencia de dominio ante el registro correspondiente en un plazo no mayor a 10 días hábiles, siendo los gastos de la misma a su exclusivo cargo.</p>
                `;
            } else {
                // NOTA DE PEDIDO (EL DISEÑO QUE TE GUSTÓ)
                const p_val = Number(document.getElementById('np-p-valor').value);
                const g_total = Number(document.getElementById('np-g-total').value);
                const fin = {
                    reserva: Number(document.getElementById('np-f-reserva').value),
                    monto: Number(document.getElementById('np-f-monto').value),
                    cuotas: document.getElementById('np-f-cuotas').value
                };

                bodyContent = `
                    <div class="title">Nota de Pedido de Unidad</div>
                    <div class="section">Proponente</div>
                    <div class="grid"><div class="box"><label>Nombre</label><p>${c.nombre.toUpperCase()}</p></div><div class="box"><label>DNI</label><p>${c.dni}</p></div></div>
                    <div class="section">Unidad Solicitada</div>
                    <div class="grid">
                        <div class="box"><label>Vehículo</label><p>${a.marca} ${a.modelo}</p></div>
                        <div class="box"><label>Precio + Gastos</label><p>$${(Number(a.precio) + g_total).toLocaleString()}</p></div>
                    </div>
                    ${p_val > 0 ? `<div class="section">Permuta</div><div class="box"><p>${document.getElementById('np-p-marca').value} - $${p_val.toLocaleString()}</p></div>` : ''}
                    <div class="section">Estructura Financiera</div>
                    <div class="grid">
                        <div class="box"><label>Reserva</label><p>$${fin.reserva.toLocaleString()}</p></div>
                        <div class="box"><label>Plan</label><p>${fin.cuotas}</p></div>
                    </div>
                `;
            }

            win.document.write(`
                <html><head><style>
                    body { font-family: 'Plus Jakarta Sans', sans-serif; padding: 40px; font-size: 11px; color: #1e293b; }
                    .header { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 10px; }
                    .title { text-align: center; font-weight: 800; text-transform: uppercase; background: #0f172a; color: white; padding: 8px; margin: 20px 0; }
                    .section { font-weight: 800; color: #2563eb; text-transform: uppercase; margin-top: 15px; border-bottom: 1px solid #e2e8f0; }
                    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
                    .box { background: #f8fafc; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; }
                    .box label { display: block; font-size: 8px; color: #64748b; }
                    .box p { margin: 0; font-weight: 600; }
                    .firmas { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; margin-top: 60px; text-align: center; }
                    .linea { border-top: 1px solid #000; padding-top: 5px; font-weight: 800; }
                </style></head><body>
                    <div class="header">
                        <div style="font-size:20px; font-weight:800">CEMZA AUTOMOTORES</div>
                        <div>Fecha: ${new Date().toLocaleDateString()}</div>
                    </div>
                    ${bodyContent}
                    <div class="firmas">
                        <div class="linea">VENDEDOR / CEMZA</div>
                        <div class="linea">COMPRADOR / PROPONENTE</div>
                    </div>
                    <script>window.print();<\/script>
                </body></html>
            `);
            win.document.close();
        }
        render();
    </script>
</body>
</html>
