<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CEMZA | DMS Enterprise Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a; --accent: #2563eb; --sidebar-bg: #0f172a;
            --main-bg: #f8fafc; --text-dark: #0f172a; --text-light: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--main-bg); display: flex; color: var(--text-dark); min-height: 100vh; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--sidebar-bg); height: 100vh; position: fixed; padding: 30px 20px; color: white; }
        .logo { font-size: 24px; font-weight: 800; margin-bottom: 50px; }
        .logo span { color: var(--accent); }
        .nav-item { padding: 14px 18px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; color: #94a3b8; transition: 0.3s; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--accent); color: white; }

        /* MAIN CONTENT */
        .main { margin-left: 260px; flex: 1; padding: 40px; }
        .view { display: none; }
        .view.active { display: block; }

        .card { background: white; border-radius: 20px; padding: 30px; border: 1px solid #e2e8f0; box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; grid-column: span 1; }
        .full { grid-column: span 4; }
        .half { grid-column: span 2; }
        
        label { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; }
        input, select, textarea { padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; font-size: 14px; }
        
        .btn { background: var(--primary); color: white; padding: 14px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* TABLAS */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: var(--text-light); font-size: 11px; text-transform: uppercase; }
        td { padding: 15px; background: white; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .section-divider { grid-column: 1/-1; padding: 15px 0; border-bottom: 2px solid #f1f5f9; color: var(--accent); font-weight: 800; font-size: 12px; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">CEMZA<span>.</span>DMS</div>
        <div class="nav-item active" onclick="switchView('view-autos', this)">Inventario</div>
        <div class="nav-item" onclick="switchView('view-clientes', this)">Clientes</div>
        <div class="nav-item" onclick="switchView('view-contratos', this)">Boleto C/V</div>
        <div class="nav-item" onclick="switchView('view-nota-pedido', this)">Nota de Pedido</div>
    </nav>

    <main class="main">
        <section id="view-autos" class="view active">
            <h1>Gestión de Inventario</h1>
            <div class="card">
                <div class="grid">
                    <div class="input-group half"><label>Marca y Modelo</label><input type="text" id="v-modelo"></div>
                    <div class="input-group"><label>Dominio</label><input type="text" id="v-dominio"></div>
                    <div class="input-group"><label>Año</label><input type="number" id="v-anio"></div>
                    <div class="input-group half"><label>Precio ($)</label><input type="number" id="v-precio"></div>
                    <button onclick="addItem('auto')" class="btn half" style="align-self: flex-end;">Guardar Vehículo</button>
                </div>
            </div>
            <div class="card">
                <table id="tabla-autos">
                    <thead><tr><th>Vehículo</th><th>Dominio</th><th>Año</th><th>Precio</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <section id="view-clientes" class="view">
            <h1>Base de Clientes</h1>
            <div class="card">
                <div class="grid">
                    <div class="input-group half"><label>Nombre y Apellido</label><input type="text" id="c-nombre"></div>
                    <div class="input-group half"><label>DNI / CUIT</label><input type="text" id="c-dni"></div>
                    <div class="input-group full"><label>Domicilio</label><input type="text" id="c-domicilio"></div>
                    <button onclick="addItem('cliente')" class="btn full">Registrar Cliente</button>
                </div>
            </div>
            <div class="card">
                <table id="tabla-clientes">
                    <thead><tr><th>Nombre</th><th>Documento</th><th>Domicilio</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <section id="view-contratos" class="view">
            <h1>Generar Boleto Compra-Venta</h1>
            <div class="card">
                <div class="grid">
                    <div class="input-group half"><label>Unidad</label><select id="sel-auto-cv"></select></div>
                    <div class="input-group half"><label>Comprador</label><select id="sel-cliente-cv"></select></div>
                    <div class="input-group full">
                        <label>Condiciones de Pago y Entrega</label>
                        <textarea id="cv-pago" rows="6" placeholder="Especifique cómo se paga: efectivo, transferencia, permutas..."></textarea>
                    </div>
                    <button onclick="imprimirPDF('cv')" class="btn full" style="background:var(--accent)">IMPRIMIR BOLETO LEGAL</button>
                </div>
            </div>
        </section>

        <section id="view-nota-pedido" class="view">
            <h1>Generar Nota de Pedido</h1>
            <div class="card">
                <div class="grid">
                    <div class="input-group half"><label>Unidad</label><select id="sel-auto-np"></select></div>
                    <div class="input-group half"><label>Cliente</label><select id="sel-cliente-np"></select></div>
                    
                    <div class="section-divider">Datos de Financiación / Gastos</div>
                    <div class="input-group"><label>Gastos ($)</label><input type="number" id="np-gastos" value="0"></div>
                    <div class="input-group"><label>Reserva ($)</label><input type="number" id="np-reserva" value="0"></div>
                    <div class="input-group"><label>Financiación ($)</label><input type="number" id="np-monto-f" value="0"></div>
                    <div class="input-group"><label>Cuotas</label><input type="text" id="np-cuotas" placeholder="12 de $..."></div>
                    
                    <button onclick="imprimirPDF('np')" class="btn full" style="background:var(--accent); margin-top:10px;">IMPRIMIR NOTA DE PEDIDO</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Datos iniciales
        let db = JSON.parse(localStorage.getItem('cemza_db')) || { autos: [], clientes: [] };

        function switchView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            updateUI();
        }

        function addItem(type) {
            if(type === 'auto') {
                db.autos.push({
                    mod: document.getElementById('v-modelo').value,
                    dom: document.getElementById('v-dominio').value,
                    anio: document.getElementById('v-anio').value,
                    precio: document.getElementById('v-precio').value
                });
            } else {
                db.clientes.push({
                    nom: document.getElementById('c-nombre').value,
                    dni: document.getElementById('c-dni').value,
                    dom: document.getElementById('c-domicilio').value
                });
            }
            localStorage.setItem('cemza_db', JSON.stringify(db));
            updateUI();
            alert("Guardado correctamente");
        }

        function updateUI() {
            // Actualizar Tablas
            document.querySelector('#tabla-autos tbody').innerHTML = db.autos.map(a => `<tr><td><b>${a.mod}</b></td><td>${a.dom}</td><td>${a.anio}</td><td>$${Number(a.precio).toLocaleString()}</td></tr>`).join('');
            document.querySelector('#tabla-clientes tbody').innerHTML = db.clientes.map(c => `<tr><td><b>${c.nom}</b></td><td>${c.dni}</td><td>${c.dom}</td></tr>`).join('');

            // Actualizar Selects
            const optA = db.autos.map((a,i) => `<option value="${i}">${a.mod} (${a.dom})</option>`).join('');
            const optC = db.clientes.map((c,i) => `<option value="${i}">${c.nom}</option>`).join('');
            
            ['cv', 'np'].forEach(t => {
                document.getElementById(`sel-auto-${t}`).innerHTML = optA;
                document.getElementById(`sel-cliente-${t}`).innerHTML = optC;
            });
        }

        function imprimirPDF(tipo) {
            const indexA = document.getElementById(`sel-auto-${tipo}`).value;
            const indexC = document.getElementById(`sel-cliente-${tipo}`).value;
            const a = db.autos[indexA];
            const c = db.clientes[indexC];

            if(!a || !c) return alert("Selecciona datos válidos");

            const win = window.open('', '_blank');
            let contenido = "";

            if(tipo === 'cv') {
                const pago = document.getElementById('cv-pago').value;
                contenido = `
                    <div class="title">Boleto de Compra-Venta</div>
                    <p>Entre <b>CEMZA AUTOMOTORES</b> y el Sr./Sra. <b>${c.nom.toUpperCase()}</b>, DNI <b>${c.dni}</b>, se vende el vehículo <b>${a.mod}</b>, Dominio <b>${a.dom}</b>, Año <b>${a.anio}</b>.</p>
                    <div class="section">Precio y Pago</div>
                    <p>Precio acordado: $${Number(a.precio).toLocaleString()}.</p>
                    <p style="background:#f1f5f9; padding:15px; border-radius:8px"><b>Detalle de pago:</b> ${pago || 'A convenir'}</p>
                `;
            } else {
                contenido = `
                    <div class="title">Nota de Pedido</div>
                    <div class="grid"><div class="box"><label>Cliente</label><p>${c.nom}</p></div><div class="box"><label>DNI</label><p>${c.dni}</p></div></div>
                    <div class="section">Vehículo Solicitado</div>
                    <p><b>${a.mod}</b> - Dominio: ${a.dom} - Año: ${a.anio}</p>
                    <div class="section">Liquidación</div>
                    <div class="grid">
                        <div class="box"><label>Precio Unidad</label><p>$${Number(a.precio).toLocaleString()}</p></div>
                        <div class="box"><label>Gastos</label><p>$${document.getElementById('np-gastos').value}</p></div>
                        <div class="box"><label>Reserva</label><p>$${document.getElementById('np-reserva').value}</p></div>
                        <div class="box"><label>Financiación</label><p>${document.getElementById('np-cuotas').value}</p></div>
                    </div>
                `;
            }

            win.document.write(`
                <html><head><style>
                    body { font-family: sans-serif; padding: 40px; color: #1e293b; line-height: 1.5; }
                    .title { text-align: center; background: #0f172a; color: white; padding: 10px; font-weight: bold; margin-bottom: 20px; }
                    .section { font-weight: bold; border-bottom: 1px solid #ccc; margin-top: 20px; text-transform: uppercase; color: #2563eb; }
                    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
                    .box { border: 1px solid #eee; padding: 10px; }
                    .box label { font-size: 10px; color: #666; }
                    .firmas { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; margin-top: 80px; text-align: center; }
                    .linea { border-top: 1px solid black; padding-top: 5px; }
                </style></head><body>
                    <h2 style="margin:0">CEMZA AUTOMOTORES</h2>
                    <hr>
                    ${contenido}
                    <div class="firmas"><div class="linea">CEMZA</div><div class="linea">CLIENTE</div></div>
                    <script>window.print();<\/script>
                </body></html>
            `);
            win.document.close();
        }

        // Cargar datos al iniciar
        window.onload = updateUI;
    </script>
</body>
</html>
